name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Restore
        shell: pwsh
        run: dotnet restore .\SingTray.sln

      - name: Build
        shell: pwsh
        run: dotnet build .\SingTray.sln -c Release --no-restore

      - name: Build self-contained installer
        shell: pwsh
        run: .\Installer\build-release.ps1 -Version "${{ github.ref_name }}" -SelfContained $true -ReleaseRoot ".\release"

      - name: Build framework-dependent installer
        shell: pwsh
        run: .\Installer\build-release.ps1 -Version "${{ github.ref_name }}" -SelfContained $false -ReleaseRoot ".\release"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release\self-contained\*.exe
            release\framework-dependent\*.exe
